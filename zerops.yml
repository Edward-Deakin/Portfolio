zerops:
  - setup: python
    build:
      base: alpine/python@3.12
      deployFiles: [app.py, templates, static]
      addToRunPrepare:
        - requirements.txt
    run:
      base: alpine/python@3.12
      prepareCommands:
        - python3 -m pip install flask gunicorn
      ports:
        - port: 3200
          httpSupport: true
      start: gunicorn --bind 0.0.0.0:3200 app:app